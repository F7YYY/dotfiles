[Settings]
language = en
backend = gslapper
folder = ~/Pictures/Wallpapers
monitors = All
wallpaper = ~/Pictures/Wallpapers/ANIMATED/Samurai-Autumn.mp4
show_path_in_tooltip = True
fill = fill
sort = name
color = #000000
subfolders = True
all_subfolders = True
show_hidden = True
show_gifs_only = False
zen_mode = False
number_of_columns = 3
swww_transition_type = random
swww_transition_step = 144
swww_transition_angle = 1
swww_transition_duration = 2
swww_transition_fps = 144
mpvpaper_sound = True
mpvpaper_options = 
use_xdg_state = False
stylesheet = ~/.config/waypaper/style.css
keybindings = ~/.config/waypaper/keybindings.ini
wallpaperengine_folder = ~/.steam/root/steamapps/workshop/content/431960
linux_wallpaperengine_clamp = none
linux_wallpaperengine_volume = 15
linux_wallpaperengine_silent = False
linux_wallpaperengine_noautomute = False
linux_wallpaperengine_no_audio_processing = False
linux_wallpaperengine_fps = 144
linux_wallpaperengine_disable_particles = True
linux_wallpaperengine_disable_mouse = False
linux_wallpaperengine_disable_parallax = False
linux_wallpaperengine_no_fullscreen_pause = False
post_command = sh -c 'case "$(file -bi "$wallpaper")" in image/*) wallust run "$wallpaper" ;; video/*) t=$(mktemp --suffix=.png) && ffmpeg -v 0 -y -i "$wallpaper" -vf thumbnail -vframes 1 "$t" >/dev/null 2>&1 && wallust run "$t" && rm -f "$t" ;; esac'

