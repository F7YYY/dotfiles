################################################################################################################
#---------------------------------------------------------------------------------(HTTPS://WIKI.HYPRLAND.ORG)---
#
#   READ_IN_DESCENDING_ORDER
#
#   WIP ~ CONVERT TO LUA (https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua)
#
#   NIRI FALLBACK WM
