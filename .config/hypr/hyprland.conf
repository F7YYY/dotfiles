#-----------------------------------------------------------------------------------------(WINDOW_MANAGEMENT)---
#---(PIP)---
# Picture-in-Picture
windowrule {
    name = picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    tag = +picture-in-picture
    tag = +picture_in_picture
    float = true
    keep_aspect_ratio = true
    move = (monitor_w*0.73) (monitor_h*0.72)
    size = (monitor_w*0.25) (monitor_h*0.25)
    pin = true
}
windowrule = float 1, match:title ^(Picture-in-Picture)$
windowrule = pin 1, match:title ^(Picture-in-Picture)$
windowrule = keep_aspect_ratio 1, match:title ^(Picture-in-Picture)$
windowrule = move 70% 70%, match:title ^(Picture-in-Picture)$
windowrule = size 25% 25%, match:title ^(Picture-in-Picture)$
#---(DIALOGS)---
windowrule = float 1, center 1, match:class modal:1
windowrule = float 1, center 1, size 900 600, match:class ^(xdg-desktop-portal-.*)$
windowrule = float 1, center 1, match:title ^(Open File|Save File|Select Folder|File Upload|Choose Files)$
#---(UTILITIES)---
windowrule = float 1, center 1, match:class ^(xdg-desktop-portal-.*|nm-connection-editor|blueman-manager|waypaper)$
windowrule = float 1, center 1, match:class ^(hyprpwcenter|pwvucontrol|easyeffects)$
#---(FOCUS_RULES)---
windowrule = idle_inhibit focus, match:class ^(mpv|vlc)$
windowrule = idle_inhibit fullscreen, match:class ^(.*)$
# Mandatory Hyprland Window Rules
#windowrule = float 1, match:class ^(HyprTile)$
#windowrule = move 0 0, match:class ^(HyprTile)$
#windowrule = match:class ^(HyprTile)$, border_size 0
#windowrule = match:title ^(WebScreenshotter)$, border_size 0
#windowrule = no_anim 1, match:class ^(HyprTile)$
# Browser Screensharing
windowrule = float 1, match:title ^(WebScreenshotter)$
windowrule = move -3000 -3000, match:title ^(WebScreenshotter)$
windowrule = no_focus 1, match:title ^(WebScreenshotter)$
#windowrule = match:class ^(HyprTile)$, rounding 0
# XWayland Screensharing
windowrule = no_initial_focus 1, match:class ^(xwaylandvideobridge)$
windowrule = no_focus 1, match:class ^(xwaylandvideobridge)$
windowrule = no_anim 1, match:class ^(xwaylandvideobridge)$
windowrule = no_blur 1, match:class ^(xwaylandvideobridge)$
windowrule = size 1 1, match:class ^(xwaylandvideobridge)$
windowrule = opacity 0.0 override 0.0 override, match:class ^(xwaylandvideobridge)$

