    animate_manual_resizes      = true      # DEFAULT=false
    animate_mouse_windowdragging = true     # DEFAULT=false
    disable_autoreload          = false     # DEFAULT=false
    enable_swallow              = false     # DEFAULT=false
    #swallow_regex               =           # DEFAULT=[[Empty]]
    #swallow_exception_regex     =           # DEFAULT=[[Empty]]
    focus_on_activate           = false     # DEFAULT=false
    mouse_move_focuses_monitor  = true      # DEFAULT=true
    allow_session_lock_restore  = true      # DEFAULT=false
    session_lock_xray           = false     # DEFAULT=false
    background_color            = $BLACK    # DEFAULT=0xffffffff
    close_special_on_empty      = true      # DEFAULT=true
    on_focus_under_fullscreen   = 2         # DEFAULT=2 [0/1/2]
    exit_window_retains_fullscreen = false  # DEFAULT=false
    initial_workspace_tracking  = 1         # DEFAULT=1
    middle_click_paste          = true      # DEFAULT=true
    render_unfocused_fps        = 144       # DEFAULT=15
    disable_xdg_env_checks      = false      # DEFAULT=false
    #disable_hyprland_qtutils_check = false  # DEFAULT=false
