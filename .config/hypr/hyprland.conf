#---------------------------------------------------------------------------------------------------(DAEMONS)---
#---(SOURCES)---
source = $HOME/.config/hypr/noctalia.conf       # AUR:noctalia-git
source = $HOME/.config/hypr/monitors.conf       # AUR:nwg-displays
#source = $HOME/.config/hypr/wallust.conf        # AUR:wallust
#---(ENVIRONMENT_VARIABLES)---
#env = XDG_CURRENT_DESKTOP, Hyprland
#env = XDG_SESSION_DESKTOP, Hyprland
#env = HYPRCURSOR_THEME, hyprcursor-rose-pine
#env = HYPRCURSOR_SIZE, 24
#env = HYPRLAND_TRACE, 1
#---(APPLICATIONS)---
exec-once = exporter --local
exec-once = startups --launch

#-------------------------------------------------------------------------------------------------(VARIABLES)---
$SUPER  = SUPER             # ANY_KEY:{SUPER|WIN|LOGO|MOD4}
$TERM   = ghostty
$LOCK   = loginctl lock-sessions     #hyprlock --quiet --immediate-render
$MENU   = noctalia msg panel-toggle launcher
$NMCC   = noctalia msg panel-toggle control-center
$NMST   = noctalia msg settings-toggle
$FILE   = nemo || yazi
$NITE   = pgrep -x wlsunset && pkill -x wlsunset || wlsunset
#---(VIM)---
$LEFT   = H
$DOWN   = J
$UP     = K
$RIGHT  = L
#---(COLORS)---
$color1 = $primary
$color2 = $secondary
$color3 = $tertiary
$color4 = $surface
$color5 = $surface_lowest
$color6 = $error
#---(fc-list : family | sort -u)---
$FONT   = "Sony Sketch EF"
$FONT_SYMBOLS = "FiraMono Nerd Font Mono"

#--------------------------------------------------------------------------------------------------(CONTROLS)---
bind    = $SUPER, ESCAPE, EXEC, $TERM
bind    = $SUPER SHIFT, ESCAPE, EXEC, $FILE
bindr   = SUPER, Super_L, EXEC, $MENU
bind    = $SUPER ALT, H, EXEC, $NITE
bind    = $SUPER, Q, killactive
bind    = $SUPER SHIFT, Q, EXEC, hyprctl activewindow | grep PID | awk '{print $2}' | xargs kill -9
bind    = $SUPER, RETURN, EXEC, hyprctl reload
bind    = $SUPER ALTCTRL, RETURN, EXEC, hyprshutdown || hyprctl dispatch exit
#bind    = $SUPER, ALT_R, EXEC, $TERM '$HOME/.config/hypr/HyprTile/sendtoggle'
#bind    = $SUPER CTRL, TAB, hyprexpo:expo, toggle        # [toggle, select, off/disable/on/enable]
#---(SCREENCAPTURES)---
bind    = ,PRINT, EXEC, hyprshot-gui --silent --output-folder $HOME/Pictures/Screenshots/   #XDG_CURRENT_DESKTOP=hyprland flameshot gui
#---(XF86_BRIGHTNESS)---
binde   = ,XF86MonBrightnessUp, EXEC, brightnessctl --quiet set 10%+
binde   = ,XF86MonBrightnessDown, EXEC, brightnessctl --quiet set 10%-
binde   = ,XF86KbdBrightnessUp, EXEC, brightnessctl --quiet --device *::kbd_backlight set 10%+
binde   = ,XF86KbdBrightnessDown, EXEC, brightnessctl --quiet --device *::kbd_backlight set 10%-
#---(XF86_AUDIO)---
binde   = ,XF86AudioRaiseVolume, EXEC, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde   = ,XF86AudioLowerVolume, EXEC, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind    = ,XF86AudioMute, EXEC, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind    = ,XF86AudioMicMute, EXEC, pactl set-source-mute @DEFAULT_SOURCE@ toggle
#---(XF86_MEDIA)---
bind    = ,XF86AudioNext, EXEC, playerctl next
bind    = ,XF86AudioPlay, EXEC, playerctl play-pause
bind    = ,XF86AudioPrev, EXEC, playerctl previous
bind    = ,XF86AudioStop, EXEC, playerctl stop
#---(XF86_POWER)---
bind    = CONTROLALT, BACKSPACE, EXEC, wlogout
bind    = ,XF86PowerOff, EXEC, $LOCK & systemctl suspend
bind    = $SUPER, XF86PowerOff, EXEC, systemctl poweroff
bind    = $SUPER SHIFT, XF86PowerOff, EXEC, systemctl reboot
#---(LAPTOP_LID)---
bindl   = ,switch:on:Lid Switch, EXEC, hyprctl dispatch dpms off
bindl   = ,switch:off:Lid Switch, EXEC, hyprctl dispatch dpms on
bindl   = ,switch:off:Lid Switch, EXEC, $LOCK, enable
bindl   = ,switch:on:Lid Switch, EXEC, $LOCK, disable

#------------------------------------------------------------------------------------------------(WORKSPACES)---
$WS     = workspace
$MWS    = movetoworkspace
$MWSS   = movetoworkspacesilent
$MS     = $MWSS, special
$TS     = togglespecialworkspace
$IDLE   = idleinhibit fullscreen
$TSM    = $TS, magic
$MSM    = $MSM:magic
#---(BINDS)---
bind    = $SUPER, F,              togglefloating
bind    = $SUPER, F,              centerwindow
bind    = $SUPER ALT, F,          fullscreen
bind    = $SUPER ALT, TAB,        layoutmsg, swapwithmaster
bind    = $SUPER, SEMICOLON,      layoutmsg, addmaster
bind    = $SUPER, APOSTROPHE,     layoutmsg, removemaster
bind    = $SUPER, V,              pseudo                      # dwindle
#---(SWITCH_WORKSPACES)---
bind    = $SUPER, 1,              $WS, 1
bind    = $SUPER, 2,              $WS, 2
bind    = $SUPER, 3,              $WS, 3
bind    = $SUPER, 4,              $WS, 4
bind    = $SUPER, 5,              $WS, 5
bind    = $SUPER, 6,              $WS, 6
bind    = $SUPER, 7,              $WS, 7
bind    = $SUPER, 8,              $WS, 8
bind    = $SUPER, 9,              $WS, 9
bind    = $SUPER, 0,              $WS, 10
bind    = $SUPER, MINUS,          $WS, -1
bind    = $SUPER, EQUAL,          $WS, +1
#---(MOVE_ACTIVE_CONTAINER_TO_WORKSPACES)---
bind    = $SUPER CTRL, 1,         $MWSS, 1
bind    = $SUPER CTRL, 2,         $MWSS, 2
bind    = $SUPER CTRL, 3,         $MWSS, 3
bind    = $SUPER CTRL, 4,         $MWSS, 4
bind    = $SUPER CTRL, 5,         $MWSS, 5
bind    = $SUPER CTRL, 6,         $MWSS, 6
bind    = $SUPER CTRL, 7,         $MWSS, 7
bind    = $SUPER CTRL, 8,         $MWSS, 8
bind    = $SUPER CTRL, 9,         $MWSS, 9
bind    = $SUPER CTRL, 0,         $MWSS, 10
bind    = $SUPER CTRL, MINUS,     $MWSS, -1
bind    = $SUPER CTRL, EQUAL,     $MWSS, +1
#---(MOVE+FOLLOW_ACTIVE_CONTAINER_TO_WORKSPACES)---
bind    = $SUPER SHIFT, 1,        $MWS, 1
bind    = $SUPER SHIFT, 2,        $MWS, 2
bind    = $SUPER SHIFT, 3,        $MWS, 3
bind    = $SUPER SHIFT, 4,        $MWS, 4
bind    = $SUPER SHIFT, 5,        $MWS, 5
bind    = $SUPER SHIFT, 6,        $MWS, 6
bind    = $SUPER SHIFT, 7,        $MWS, 7
bind    = $SUPER SHIFT, 8,        $MWS, 8
bind    = $SUPER SHIFT, 9,        $MWS, 9
bind    = $SUPER SHIFT, 0,        $MWS, 10
bind    = $SUPER SHIFT, MINUS,    $MWS, -1
bind    = $SUPER SHIFT, EQUAL,    $MWS, +1
#---(MOVE_CONTAINERS_TO_SPECIAL)---
bind    = $SUPER, BACKSPACE,          $TS
bind    = $SUPER CTRL, BACKSPACE,     $MS
bind    = $SUPER, BACKSLASH,          $TSM
bind    = $SUPER CTRL, BACKSLASH,     $MSM
#---(TAB_WORKSPACES)---
bind    = $SUPER, TAB,            $WS, e+1
bind    = $SUPER SHIFT, TAB,      $WS, e-1
bind    = $SUPER, MOUSE_UP,       $WS, e+1
bind    = $SUPER, MOUSE_DOWN,     $WS, e-1
#---(CHANGE_FOCUSED_WINDOWS)---
bind    = ALT, TAB,               cyclenext
bind    = $SUPER, LEFT,           movefocus, l
bind    = $SUPER, RIGHT,          movefocus, r
bind    = $SUPER, UP,             movefocus, u
bind    = $SUPER, DOWN,           movefocus, d
#---(RESIZE_MOVE_CONTAINERS)---
binde   = $SUPER ALT, LEFT,       resizeactive, -50 0
binde   = $SUPER ALT, RIGHT,      resizeactive, 50 0
binde   = $SUPER ALT, UP,         resizeactive, 0 -50
binde   = $SUPER ALT, DOWN,       resizeactive, 0 50
bindm   = $SUPER, mouse:272,      movewindow
bindm   = $SUPER, mouse:273,      resizewindow
bind    = $SUPER CTRL, LEFT,      movewindow, l
bind    = $SUPER CTRL, RIGHT,     movewindow, r
bind    = $SUPER CTRL, UP,        movewindow, u
bind    = $SUPER CTRL, DOWN,      movewindow, d

