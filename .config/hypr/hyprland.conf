#───────────────────────────────────────────────────────────────────────────────────────────────────(DAEMONS)───
#───(ENVIRONMENT_VARIABLES)
#env = XDG_CURRENT_DESKTOP,Hyprland		# GLOBAL ENVIRONMENT
#env = XDG_SESSION_DESKTOP,Hyprland		# GLOBAL ENVIRONMENT
#env = HYPRLAND_TRACE,1

#───(HYPRLAND_SPECIFIC)
exec-once = hypridle                    # SYSTEMD
exec-once = hyprpaper                   # SYSTEMD
exec-once = hyprpolkitagent             # SYSTEMD
exec-once = hyprsunset                  # SYSTEMD
exec-once = hyprshell run &             # SYSTEMD
#exec-once = hyprctl <VARIABLE> <THEME> <SIZE>

#───(APPLICATIONS)
exec-once = waybar
exec-once = wl-paste --watch cliphist store
exec-once = wl-clip-persist --clipboard regular

#─────────────────────────────────────────────────────────────────────────────────────────────────(VARIABLES)───
$SUPER      = MOD4
$FONT       = Sony Sketch EF, Symbols Nerd Font Mono        #───(kitty list-fonts)───#
$TERM       = kitty
$LOCK       = hyprlock --quiet
#───(VIM_KEYS)
$LEFT       = H
$DOWN       = J
$UP         = K
$RIGHT      = L
#───(COLORS)
$RED        = rgba(FF0000FF)
$WHITE      = rgba(FFFFFFFF)
$GREY       = rgba(FFFFFFAA)
$BLACK      = rgba(000000FF)
$CLEAR      = rgba(00000000)

#──────────────────────────────────────────────────────────────────────────────────────────────────(CONTROLS)───
#bind = $SUPERALT,R,exec,hyprctl reload
bind  = $SUPER,Q,killactive
bind  = $SUPER,ESCAPE,exec,$TERM
bind  = $SUPERSHIFT,ESCAPE,exec,$TERM ranger
#bind  = $SUPERCTRL,ESCAPE,exec,hypr
bind  = $SUPER,SPACE,exec,rofi -show drun
bind  = $SUPERALT,SPACE,exec,rofi -show combi -combi-modes "window,drun,filebrowser,run,ssh,combi,calc"
bind  = $SUPER,C,exec,cliphist list | rofi -dmenu -i -p "󰅍 Clipboard" | cliphist decode | wl-copy
bind  = $SUPERALT,H,exec,pkill hyprsunset || hyprsunset --temperature 4nNN000
#bind  = $SUPERCTRL, TAB, hyprexpo:expo, toggle      # [toggle, select, off/disable/on/enable]
#───(SCREENSHOT+GIF)
bind  = ,PRINT,exec,flameshot screen      #XDG_CURRENT_DESKTOP=Sway flameshot screen
bind  = ,SHIFTPRINT,exec,flameshot gui    #XDG_CURRENT_DESKTOP=Sway flameshot gui
#───(XF86_BRIGHTNESS)
binde = ,XF86MonBrightnessUp,exec,brightnessctl --quiet set 10%+
binde = ,XF86MonBrightnessDown,exec,brightnessctl --quiet set 10%-
binde = ,XF86KbdBrightnessUp,exec,brightnessctl --quiet --device *::kbd_backlight set 10%+
binde = ,XF86KbdBrightnessDown,exec,brightnessctl --quiet --device *::kbd_backlight set 10%-
#───(XF86_PULSEAUDIO)
binde = ,XF86AudioRaiseVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = ,XF86AudioLowerVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ -5%
bind  = ,XF86AudioMute,exec,pactl set-sink-mute @DEFAULT_SINK@ toggle
bind  = ,XF86AudioMicMute,exec,pactl set-source-mute @DEFAULT_SOURCE@ toggle
#───(XF86_MEDIA)
bind  = ,XF86AudioNext,exec,playerctl next
bind  = ,XF86AudioPlay,exec,playerctl play-pause
bind  = ,XF86AudioPrev,exec,playerctl previous
bind  = ,XF86AudioStop,exec,playerctl stop
#───(XF86_POWER)
#bind = CONTROLALT,DELETE,exec,$HOME/.config/rofi/SCRIPTS/POWERMENU.sh
bind = ,XF86PowerOff,exec,hyprlock & disown; systemctl suspend
bind = $SUPER,XF86PowerOff,exec,pkill -SIGINT electron; systemctl poweroff
bind = $SUPERSHIFT,XF86PowerOff,exec,pkill -SIGINT electron; systemctl reboot
#───(LAPTOP_LID)
bindl = ,switch:Lid Switch,exec,$LOCK
bindl = ,switch:on:Lid,exec,hyprctl keyword monitor
bindl = ,switch:off:Lid,exec,hyprctl keyword monitor
bindl = ,switch:off:Lid Switch,exec,$LOCK,enable
bindl = ,switch:on:Lid Switch,exec,$LOCK,disable

#────────────────────────────────────────────────────────────────────────────────────────────────(WORKSPACES)───
$WS   = workspace
$MWS  = movetoworkspace
$MWSS = movetoworkspacesilent
$MS   = $MWSS,special
$TS   = togglespecialworkspace
$IDLE = idleinhibit fullscreen
#───(BINDS)
bind  = $SUPER,F,             togglefloating
bind  = $SUPER,F,             centerwindow
bind  = $SUPERALT,F,          fullscreen
bind  = $SUPERALT,TAB,        layoutmsg,swapwithmaster
bind  = $SUPER,SEMICOLON,     layoutmsg,addmaster
bind  = $SUPER,APOSTROPHE,    layoutmsg,removemaster
bind  = $SUPER,V,             pseudo                      # dwindle
bind  = $SUPER,S,             togglesplit                 # dwindle
#───(SWITCH_WORKSPACES)
bind  = $SUPER,1,             $WS,1
bind  = $SUPER,2,             $WS,2
bind  = $SUPER,3,             $WS,3
bind  = $SUPER,4,             $WS,4
bind  = $SUPER,5,             $WS,5
bind  = $SUPER,6,             $WS,6
bind  = $SUPER,7,             $WS,7
bind  = $SUPER,8,             $WS,8
bind  = $SUPER,9,             $WS,9
bind  = $SUPER,0,             $WS,10
bind  = $SUPER,MINUS,         $WS,-1
bind  = $SUPER,EQUAL,         $WS,+1
#───(MOVE_ACTIVE_CONTAINER_TO_WORKSPACES)
bind  = $SUPERCTRL,1,         $MWSS,1
bind  = $SUPERCTRL,2,         $MWSS,2
bind  = $SUPERCTRL,3,         $MWSS,3
bind  = $SUPERCTRL,4,         $MWSS,4
bind  = $SUPERCTRL,5,         $MWSS,5
bind  = $SUPERCTRL,6,         $MWSS,6
bind  = $SUPERCTRL,7,         $MWSS,7
bind  = $SUPERCTRL,8,         $MWSS,8
bind  = $SUPERCTRL,9,         $MWSS,9
bind  = $SUPERCTRL,0,         $MWSS,10
bind  = $SUPERCTRL,MINUS,     $MWSS,-1
bind  = $SUPERCTRL,EQUAL,     $MWSS,+1
#───(MOVE+FOLLOW_ACTIVE_CONTAINER_TO_WORKSPACES)
bind  = $SUPERSHIFT,1,        $MWS,1
bind  = $SUPERSHIFT,2,        $MWS,2
bind  = $SUPERSHIFT,3,        $MWS,3
bind  = $SUPERSHIFT,4,        $MWS,4
bind  = $SUPERSHIFT,5,        $MWS,5
bind  = $SUPERSHIFT,6,        $MWS,6
bind  = $SUPERSHIFT,7,        $MWS,7
bind  = $SUPERSHIFT,8,        $MWS,8
bind  = $SUPERSHIFT,9,        $MWS,9
bind  = $SUPERSHIFT,0,        $MWS,10
bind  = $SUPERSHIFT,MINUS,    $MWS,-1
bind  = $SUPERSHIFT,EQUAL,    $MWS,+1
#───(MOVE_CONTAINERS_TO_SPECIAL)
bind  = $SUPER,BACKSPACE,     $TS
bind  = $SUPERCTRL,BACKSPACE, $MS
#───(TAB_WORKSPACES)
bind  = $SUPER,TAB,           $WS,e+1
bind  = $SUPERSHIFT,TAB,      $WS,e-1
bind  = $SUPER,mouse_up,      $WS,e+1
bind  = $SUPER,mouse_down,    $WS,e-1
#───(CHANGE_FOCUSED_WINDOWS)
bind  = ALT,TAB,              cyclenext
bind  = $SUPER,LEFT,          movefocus,l
bind  = $SUPER,RIGHT,         movefocus,r
bind  = $SUPER,UP,            movefocus,u
bind  = $SUPER,DOWN,          movefocus,d
#───(RESIZE_MOVE_CONTAINERS)
binde = $SUPERALT,LEFT,      resizeactive,-50 0
binde = $SUPERALT,RIGHT,     resizeactive,50 0
binde = $SUPERALT,UP,        resizeactive,0 -50
binde = $SUPERALT,DOWN,      resizeactive,0 50
bindm = $SUPER,mouse:272,    movewindow
bindm = $SUPER,mouse:273,    resizewindow
bind  = $SUPERCTRL,LEFT,      movewindow,l
bind  = $SUPERCTRL,RIGHT,     movewindow,r
bind  = $SUPERCTRL,UP,        movewindow,u
bind  = $SUPERCTRL,DOWN,      movewindow,d

#─────────────────────────────────────────────────────────────────────────────────────────(WINDOW_MANAGEMENT)───
#───(hyprctl clients | awk 'tolower($0) ~ /(class|title)/ && NF > 1')───#
#windowrule      = DEPRECATED
#windowrulev2    = DEPRECATED
#layerrule       = DEPRECATED
#layerrulev2     = DEPRECATED

#───────────────────────────────────────────────────────────────────────────────────────────────(PERIPHERALS)───
input {
    #───(KEYBOARD)
    #kb_model                    = us            # DEFAULT=[[Empty]]
    #kb_layout                   = us            # DEFAULT=us
    #kb_variant                  =               # DEFAULT=[[Empty]]
    #kb_options                  =               # DEFAULT=[[Empty]]
    #kb_rules                    =               # DEFAULT=[[Empty]]
    #kb_file                     =               # DEFAULT=[[Empty]]
    numlock_by_default          = true          # DEFAULT=false
    resolve_binds_by_sym        = false         # DEFAULT=false
    repeat_rate                 = 50            # DEFAULT=25
    repeat_delay                = 500           # DEFAULT=600
    #───(MOUSE)
    sensitivity                 = -1.0          # DEFAULT=0.0
    #accel_profile               = flat          # DEFAULT=[[Empty]]
    force_no_accel              = true          # DEFAULT=false
    rotation                    = 0             # DEFAULT=0
    left_handed                 = false         # DEFAULT=false
    #scroll_points               =               # DEFAULT=[[Empty]]
    scroll_method               = 2fg           # DEFAULT=[2fg/edge/on_button_down/no_scroll]
    scroll_button               = 0             # DEFAULT=0
    scroll_button_lock          = false         # DEFAULT=false
    scroll_factor               = 1.0           # DEFAULT=1.0
    natural_scroll              = false         # DEFAULT=false
    follow_mouse                = 2             # DEFAULT=1
    #follow_mouse_shrink         = 0             # DEFAULT=0
    follow_mouse_threshold      = 0.0           # DEFAULT=0.0
    focus_on_close              = 2             # DEFAULT=0
    mouse_refocus               = true          # DEFAULT=true
    float_switch_override_focus = 2             # DEFAULT=1
    special_fallthrough         = true          # DEFAULT=false
    off_window_axis_events      = 1             # DEFAULT=1
    emulate_discrete_scroll     = 0             # DEFAULT=1
    #───(VIDEO)───(AUR/wdisplays)
    monitor = ,highres,auto,1
    monitor = DP-1,highres,0x420,1
    monitor = DP-2,highres,1920x0,1,transform,1
    monitor = DVI-I-1,highres,3000x720,1,transform,2
#───:
    touchpad {
        disable_while_typing    = true      # DEFAULT=true
        natural_scroll          = false     # DEFAULT=false
        scroll_factor           = 1.0       # DEFAULT=1.0
        middle_button_emulation = false     # DEFAULT=false
        #tap_button_map          =           # DEFAULT=[[Empty]]
        clickfinger_behavior    = true      # DEFAULT=false
        tap-to-click            = true      # DEFAULT=true
        drag_lock               = 0         # DEFAULT=0
        tap-and-drag            = true      # DEFAULT=true
        flip_x                  = false     # DEFAULT=false
        flip_y                  = false     # DEFAULT=false
        drag_3fg                = 0         # DEFAULT=0
    }
#───:
    touchdevice {
        enabled                 = true      # DEFAULT=true
        transform               = -1        # DEFAULT=-1
        #output                  =           # DEFAULT=[[Auto]]
    }
#───:
    virtualkeyboard {
        share_states                = 2     # DEFAULT=2
        release_pressed_on_close    = false # DEFAULT=false
    }
#───:
    tablet {
        transform                   = -1    # DEFAULT=-1
        #output                      =       # DEFAULT=[[Empty]]
        region_position             = 0, 0  # DEFAULT=0, 0
        absolute_region_position    = false # DEFAULT=false
        region_size                 = 0, 0  # DEFAULT=0, 0
        relative_input              = false # DEFAULT=false
        left_handed                 = false # DEFAULT=false
        active_area_size            = 0, 0  # DEFAULT=0, 0
        active_area_position        = 0, 0  # DEFAULT=0, 0
    }
}
group {
    auto_group                  = true              # DEFAULT=true
    insert_after_current        = true              # DEFAULT=true
    focus_removed_window        = true              # DEFAULT=true
    drag_into_group             = 1                 # DEFAULT=1
    merge_groups_on_drag        = true              # DEFAULT=true
    merge_groups_on_groupbar    = true              # DEFAULT=true
    merge_floated_into_tiled_on_groupbar = true     # DEFAULT=false
    group_on_movetoworkspace    = true              # DEFAULT=false
    col.border_active           = $WHITE            # DEFAULT=0x66ffff00
    col.border_inactive         = $BLACK            # DEFAULT=0x66777700
    col.border_locked_active    = $GREY             # DEFAULT=0x66ff5500
    col.border_locked_inactive  = $BLACK            # DEFAULT=0x66775500
#───:
    groupbar {
        enabled                 = true              # DEFAULT=true
        font_family             = $FONT             # DEFAULT=[[Empty]]
        font_size               = 12                # DEFAULT=8
        font_weight_active      = normal            # DEFAULT=normal
        font_weight_inactive    = normal            # DEFAULT=normal
        gradients               = true              # DEFAULT=false
        height                  = 12                # DEFAULT=14
        indicator_gap           = 0                 # DEFAULT=0
        indicator_height        = 2                 # DEFAULT=3
        stacked                 = false             # DEFAULT=false
        priority                = 3                 # DEFAULT=3
        render_titles           = true              # DEFAULT=true
        text_offset             = 0                 # DEFAULT=0
        text_padding            = 0                 # DEFAULT=0
        scrolling               = true              # DEFAULT=true
        rounding                = 12                # DEFAULT=1
        rounding_power          = 2.0               # DEFAULT=2.0
        gradient_rounding       = 12                # DEFAULT=2
        gradient_rounding_power = 2.0               # DEFAULT=2.0
        round_only_edges        = true              # DEFAULT=true
        gradient_round_only_edges = true            # DEFAULT=true
        #text_color              = $BLACK            # DEFAULT=0xffffffff
        #text_color_inactive     = $GREY             # DEFAULT=unset
        #text_color_locked_active = $WHITE           # DEFAULT=unset
        #text_color_locked_inactive = $GREY          # DEFAULT=unset
        #col.active              = $WHITE            # DEFAULT=0x66ffff00
        #col.inactive            = $BLACK            # DEFAULT=0x66777700
        #col.locked_active       = $WHITE            # DEFAULT=0x66ff5500
        #col.locked_inactive     = $BLACK            # DEFAULT=0x66775500
        gaps_in                 = 4                 # DEFAULT=2
        gaps_out                = 8                 # DEFAULT=2
        keep_upper_gap          = true              # DEFAULT=true
        blur                    = true              # DEFAULT=false
    }
}
general {
    border_size                 = 2    # DEFAULT=1
    gaps_in                     = 4    # DEFAULT=5
    gaps_out                    = 8    # DEFAULT=20
    float_gaps                  = 0    # DEFAULT=0
    gaps_workspaces             = 8    # DEFAULT=0
    col.inactive_border         = $GREY     # DEFAULT=0xff444444
    col.active_border           = $WHITE    # DEFAULT=0xffffffff
    col.nogroup_border          = $WHITE    # DEFAULT=0xffffaaff
    col.nogroup_border_active   = $WHITE    # DEFAULT=0xffff00ff
    layout                      = master    # DEFAULT=dwindle / master
    no_focus_fallback           = true      # DEFAULT=false
    resize_on_border            = true      # DEFAULT=false
    extend_border_grab_area	    = 1         # DEFAULT=15
    hover_icon_on_border        = true      # DEFAULT=true
    allow_tearing               = false     # DEFAULT=false
    resize_corner               = 0         # DEFAULT=0 - 4
    modal_parent_blocking       = true      # DEFAULT=true
    #locale                      =           # DEFAULT=[[Empty]]
    snap {
        enabled                 = true      # DEFAULT=false
        window_gap              = 8         # DEFAULT=10
        monitor_gap             = 8         # DEFAULT=10
        border_overlap          = true      # DEFAULT=false
        respect_gaps            = true      # DEFAULT=false
    }
}
misc {
    disable_hyprland_logo       = true      # DEFAULT=false
    disable_splash_rendering    = true      # DEFAULT=false
