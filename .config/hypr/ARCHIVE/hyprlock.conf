#────────────────────────────────────────────────────────────────────────────────────────(SOURCES)───
$IMG                        = $HOME/.config/hypr/Hyprlock/assets
$WALLPAPER                  = screenshot
$WIDGET                     = $HOME/.config/hypr/Hyprlock
#───(COLORS)
$BACKGROUND                 = rgba(0, 0, 0, 0)
$FOREGROUND                 = rgba(255, 255, 255, 1.0)
$FOREGROUND-ALT             = rgba(255, 255, 255, 0.3)
#───(FONT)─("fc-list : family | sort | uniq")
font_family                 = Sony Sketch EF
$FONT1                      = Ndot55Caps
$FONT2                      = Ndot57Caps

#─────────────────────────────────────────────────────────────────────────────────────(EVERYTHING)───
#───(GENERAL)
general = {
    monitor                 =
    font                    = $FONT
    disable_loading_bar     = true
    hide_cursor             = true
    ignore_empty_input      = true
    immediate_render        = true
}

#────────────────────────────────────────────────────────────────────────────────────────(PRESETS)───
#───(BACKGROUND)
background {
    path                    = $WALLPAPER
    blur_passes             = 2
    blur_size               = 5
    contrast                = 0.8916
    brightness              = 0.8172
    vibrancy                = 0.1696
    vibrancy_darkness       = 0.0
}
# TOP LINE
shape {
    size                    = 1300, 2
    color                   = $FOREGROUND
    rounding                = -1 # circle
    position                = 0, 270
    halign                  = center
    valign                  = center
}
# ICON-ARROW 
