-------------------- TIME & DATE --------------------
# CLOCK-HOUR
label {
    text                    = cmd[update:1000] echo "<b><big> $(date +"%I") </big></b>" # 12-h format (%H for 24-h format)
    color                   = $FOREGROUND
    font_family             = $FONT1
    font_size               = 80
    position                = 7, -22
    halign                  = left
    valign                  = top
}
#CLOCK-MINUTE
label {
    text                    = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color                   = $FOREGROUND
    font_family             = $FONT1
    font_size               = 80
    position                = 7, -123
    halign                  = left
    valign                  = top
}
#DATE
label {
    text                    = cmd[update:1000] echo -e "$(date +"%a %B %d")"
    color                   = $FOREGROUND
    font_family             = $FONT1
    font_size               = 50
    position                = -20, -125 
    rotate                  = 90
    halign                  = right
    valign                  = top
}
#YEAR
label {
    text                    = cmd[update:1000] echo -e "$(date +"%Y")"
    color                   = $FOREGROUND
    font_family             = $FONT2
    font_size               = 10
    position                = -48, -28 
    halign                  = right
    valign                  = top
}

