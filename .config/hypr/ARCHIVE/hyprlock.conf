--------------------- USER --------------------
# AVATAR
image {
    path = $HOME/Pictures/Wallpapers/ANIMATED/angel.mp4
    border_color            = $FOREGROUND-ALT
    border_size             = 0
    size                    = 110
    rounding                = 6
    rotate                  = 0
    opacity                 = 1
    reload_time             = -1
    reload_cmd              =
    position                = 30, 20
    halign                  = left
    valign                  = bottom
}

-------------------- INPUT --------------------
# INPUT BOX
input-field {
    monitor                 = 
    size                    = 80, 25
    rounding                = 3 
    outline_thickness       = 0
    hide_input              = false
    inner_color             = $BACKGROUND 
    outer_color             = $BACKGROUND
    check_color             = $BACKGROUND
    dots_size               = 0.35
    dots_spacing            = 0.3
    dots_center             = true
    dots_rounding           = -1
    font_family             = $FONT2
    font_color              = $FOREGROUND
    placeholder_text        = PASSCODE 
    fail_text               = WHOAMI <b>($ATTEMPTS)</b>
    fade_on_empty           = false
    fade_timeout            = 200
    fail_transition         = 300
    position                = 200, 20
    halign                  = left
    valign                  = bottom
}

-------------------- WIDGET --------------------
# BATTERY
label {
    monitor             =
    text                = cmd[update:1000] echo -e "$($WIDGET/battery.sh)"
    color               = $FOREGROUND
    font_family         = $FONT1
    font_size           = 12
    position            = -1080, 110
    halign              = right
    valign              = bottom
    zindex              = 1
}
