#######─(https://wiki.archlinux.org/index.php/rEFInd/)─#######
#
#──────────────────────────────────────────────────(THEME)───#
#include themes/mine/theme-1.conf
#include themes/mine/theme-2.conf
#include themes/mine/theme-3.conf
include themes/catppuccin/mocha.conf

#──────────────────────────────────────────────(VARIABLES)───#
timeout -1
#log_level 4
#shutdown_after_timeout
use_nvram false
hideui all
#icons_dir themes/mine/assets/icons
#banner themes/mine/assets/black.png
#banner_scale fillscreen
#selection_big themes/mine/assets/selection-big.png
#selection_small themes/mine/assets/selection-small.png
#font Sony Sketch EF 12 point
#textonly
#textmode 0
resolution max
enable_touch
enable_mouse
mouse_size 16
mouse_speed 16
use_graphics_for linux, windows
showtools
write_systemd_vars true

#────────────────────────────────────────────────(STANZAS)───#
menuentry "TERMINAL" {
	icon		/EFI/refind/icons/os_arch.png
	volume		"I_USE_ARCH_BTW"
	loader		/EFI/Linux/arch-linux.efi
	options		"booster.log=debug,console"
	add_options	"systemd.unit=multi-user.target"
	submenuentry "XANMOD" {
		loader	/EFI/Linux/arch-linux-xanmod.efi
	}
	submenuentry "RT" {
		loader	/EFI/Linux/arch-linux-rt.efi
	}
	submenuentry "ZEN" {
		loader	/EFI/Linux/arch-linux-zen.efi
	}
	submenuentry "LTS" {
		loader	/EFI/Linux/arch-linux-lts.efi
	}
disabled	# COMPLETE BOOSTER & BOOSTER-UM UKIs
}
